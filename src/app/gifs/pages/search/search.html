<h2 class="text-2xl font-bold mt-5">Buscador de gifs</h2>
<h3 class="text-sm text-gray-500 font-bold mt-5">Buscador de gifs por nombre, descripcion o tag</h3>
<div class="grid grid-cols-1 gap-4">
    <input type="text" placeholder="Buscar" class="mt-3 border border-gray-300 rounded-md p-2"
        (keyup.enter)="onSearch(txtSearch.value)" #txtSearch />
    <app-gif-list [gifList]="gifService.searchGifs()"></app-gif-list>

</div>
